<!DOCTYPE html>

<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="NeuAutoStock">
<meta name="theme-color" content="#0a0a0b">
<title>NeuAutoStock</title>
<style>
:root {
--bg-primary: #0a0a0b;
--bg-secondary: #111113;
--bg-tertiary: #18181b;
--bg-elevated: #1f1f23;
--bg-glass: rgba(17,17,19,0.92);
--border-subtle: rgba(255,255,255,0.06);
--border-medium: rgba(255,255,255,0.12);
--border-strong: rgba(255,255,255,0.2);
--text-primary: #f4f4f5;
--text-secondary: #a1a1aa;
--text-tertiary: #52525b;
--text-muted: #3f3f46;
--gold: #d4a84b;
--gold-dim: #b8923f;
--gold-glow: rgba(212,168,75,0.18);
--danger: #ef4444;
--danger-dim: rgba(239,68,68,0.12);
--success: #22c55e;
--success-dim: rgba(34,197,94,0.12);
--info: #3b82f6;
--info-dim: rgba(59,130,246,0.12);
--warning: #f97316;
--warning-dim: rgba(249,115,22,0.12);
--purple: #a855f7;
--purple-dim: rgba(168,85,247,0.12);
--r-xs:6px; --r-sm:10px; --r-md:14px; --r-lg:20px; --r-xl:28px;
--safe-top:env(safe-area-inset-top);
--safe-bottom:env(safe-area-inset-bottom);
--safe-left:env(safe-area-inset-left);
--safe-right:env(safe-area-inset-right);
--mono:'SF Mono','Fira Code','Consolas','Courier New',monospace;
--sans:-apple-system,BlinkMacSystemFont,'SF Pro Text','Helvetica Neue',Arial,sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;-webkit-touch-callout:none;}
html,body{background:var(--bg-primary);color:var(--text-primary);font-family:var(--sans);height:100%;overscroll-behavior:none;overflow-x:hidden;}
body{padding-top:var(--safe-top);padding-bottom:var(--safe-bottom);padding-left:var(--safe-left);padding-right:var(--safe-right);}

/* HEADER */
.header{position:sticky;top:0;z-index:100;background:var(–bg-glass);backdrop-filter:blur(24px) saturate(180%);-webkit-backdrop-filter:blur(24px) saturate(180%);border-bottom:1px solid var(–border-subtle);padding:12px 16px 14px;}
.header-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;}
.brand{display:flex;align-items:center;gap:10px;}
.brand-icon{width:36px;height:36px;background:linear-gradient(145deg,var(–gold),var(–gold-dim));border-radius:var(–r-sm);display:flex;align-items:center;justify-content:center;font-family:var(–mono);font-weight:700;font-size:18px;color:var(–bg-primary);box-shadow:0 2px 12px var(–gold-glow);}
.brand-text{display:flex;flex-direction:column;}
.brand-title{font-size:18px;font-weight:700;letter-spacing:-0.5px;color:var(–text-primary);}
.brand-subtitle{font-size:10px;font-weight:500;color:var(–text-tertiary);text-transform:uppercase;letter-spacing:1.5px;}
.header-actions{display:flex;gap:8px;align-items:center;}
.btn-add{background:var(–gold);color:var(–bg-primary);border:none;border-radius:var(–r-xl);padding:10px 18px;font-size:13px;font-weight:700;font-family:inherit;cursor:pointer;display:flex;align-items:center;gap:5px;box-shadow:0 2px 12px var(–gold-glow);transition:transform .15s;}
.btn-add:active{transform:scale(0.96);}
.btn-add svg{width:14px;height:14px;}
.btn-icon{background:var(–bg-tertiary);border:1px solid var(–border-medium);color:var(–text-secondary);border-radius:var(–r-sm);width:38px;height:38px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:16px;transition:all .15s;}
.btn-icon:active{background:var(–bg-elevated);transform:scale(0.95);}
.storage-badge{display:inline-flex;align-items:center;gap:5px;font-size:10px;font-weight:600;padding:4px 8px;border-radius:20px;background:var(–success-dim);color:var(–success);border:1px solid rgba(34,197,94,0.2);}
.storage-badge.warn{background:var(–warning-dim);color:var(–warning);border-color:rgba(249,115,22,0.2);}
.storage-badge .dot{width:6px;height:6px;border-radius:50%;background:currentColor;}

/* Search */
.search-wrap{position:relative;margin-bottom:12px;}
.search-input{width:100%;background:var(–bg-tertiary);border:1px solid var(–border-subtle);border-radius:var(–r-md);color:var(–text-primary);font-size:15px;font-family:inherit;padding:12px 44px 12px 44px;outline:none;-webkit-appearance:none;transition:border-color .2s,box-shadow .2s;}
.search-input::placeholder{color:var(–text-tertiary);}
.search-input:focus{border-color:var(–gold);box-shadow:0 0 0 3px var(–gold-glow);}
.search-icon{position:absolute;left:14px;top:50%;transform:translateY(-50%);color:var(–text-tertiary);pointer-events:none;}
.search-clear{position:absolute;right:8px;top:50%;transform:translateY(-50%);background:var(–bg-elevated);border:none;color:var(–text-tertiary);width:28px;height:28px;border-radius:50%;font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;opacity:0;transition:opacity .15s;}
.search-wrap.has-value .search-clear{opacity:1;}

/* Categories */
.cats-scroll{overflow-x:auto;scrollbar-width:none;margin:0 -16px;padding:0 16px;}
.cats-scroll::-webkit-scrollbar{display:none;}
.cats{display:flex;gap:8px;padding-bottom:2px;}
.cat-pill{white-space:nowrap;padding:8px 16px;border-radius:var(–r-xl);border:1px solid var(–border-subtle);background:var(–bg-tertiary);color:var(–text-secondary);font-size:13px;font-weight:500;font-family:inherit;cursor:pointer;flex-shrink:0;transition:all .2s;display:flex;align-items:center;gap:6px;}
.cat-pill:active{transform:scale(0.96);}
.cat-pill.active{background:var(–gold);color:var(–bg-primary);border-color:var(–gold);font-weight:600;box-shadow:0 2px 12px var(–gold-glow);}
.cat-pill .count{font-size:11px;font-weight:700;background:rgba(0,0,0,0.15);padding:2px 7px;border-radius:10px;min-width:20px;text-align:center;}
.cat-pill.active .count{background:rgba(0,0,0,0.25);}
.cat-pill.alert-cat{border-color:var(–danger);color:var(–danger);background:var(–danger-dim);}
.cat-pill.alert-cat.active{background:var(–danger);color:white;border-color:var(–danger);}

/* QUICK STOCK */
.quick-stock{background:var(–bg-secondary);border-bottom:1px solid var(–border-subtle);overflow:hidden;max-height:400px;transition:max-height .3s ease;}
.quick-stock.collapsed{max-height:48px;}
.quick-stock-header{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;cursor:pointer;user-select:none;}
.quick-stock-title{font-size:12px;font-weight:600;color:var(–text-tertiary);text-transform:uppercase;letter-spacing:1px;display:flex;align-items:center;gap:8px;}
.quick-stock-toggle{background:none;border:none;color:var(–text-tertiary);cursor:pointer;padding:4px;display:flex;align-items:center;transition:transform .3s;}
.quick-stock.collapsed .quick-stock-toggle{transform:rotate(180deg);}
.quick-stock-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(72px,1fr));gap:6px;padding:0 12px 12px;max-height:180px;overflow-y:auto;scrollbar-width:thin;scrollbar-color:var(–border-medium) transparent;}
.quick-stock-grid::-webkit-scrollbar{width:4px;}
.quick-stock-grid::-webkit-scrollbar-thumb{background:var(–border-medium);border-radius:2px;}
.quick-ref{background:var(–bg-tertiary);border:1px solid var(–border-subtle);border-radius:var(–r-sm);padding:8px 6px;text-align:center;cursor:pointer;transition:all .15s;position:relative;overflow:hidden;}
.quick-ref:active{transform:scale(0.95);}
.quick-ref.in-stock{border-color:rgba(34,197,94,0.3);}
.quick-ref.low-stock{border-color:rgba(239,68,68,0.4);background:var(–danger-dim);}
.quick-ref.zero-stock{opacity:0.4;}
.quick-ref-code{font-family:var(–mono);font-size:10px;font-weight:600;color:var(–gold);letter-spacing:0.3px;margin-bottom:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.quick-ref-qty{font-size:16px;font-weight:700;color:var(–text-primary);}
.quick-ref.low-stock .quick-ref-qty{color:var(–danger);}
.quick-ref.zero-stock .quick-ref-qty{color:var(–text-muted);}
.quick-ref-dot{position:absolute;top:4px;right:4px;width:6px;height:6px;border-radius:50%;background:var(–danger);animation:pulse-dot 1.5s infinite;}
@keyframes pulse-dot{0%,100%{opacity:1;transform:scale(1);}50%{opacity:0.5;transform:scale(0.8);}}

/* STATS */
.stats-bar{display:flex;gap:8px;padding:12px 16px;overflow-x:auto;scrollbar-width:none;background:var(–bg-primary);}
.stats-bar::-webkit-scrollbar{display:none;}
.stat-chip{background:var(–bg-secondary);border:1px solid var(–border-subtle);border-radius:var(–r-md);padding:10px 14px;flex-shrink:0;display:flex;flex-direction:column;align-items:center;min-width:68px;}
.stat-value{font-size:20px;font-weight:700;font-family:var(–mono);color:var(–success);}
.stat-value.warn{color:var(–danger);}
.stat-label{font-size:10px;font-weight:500;color:var(–text-tertiary);text-transform:uppercase;letter-spacing:0.5px;margin-top:2px;}

/* GRID */
.main-content{padding:0 12px 120px;}
.section-header{display:flex;align-items:center;gap:10px;padding:16px 4px 10px;}
.section-line{flex:1;height:1px;background:linear-gradient(90deg,var(–border-medium),transparent);}
.section-title{font-size:11px;font-weight:700;color:var(–text-tertiary);text-transform:uppercase;letter-spacing:1.5px;}
.section-badge{background:var(–bg-elevated);padding:3px 8px;border-radius:10px;font-size:10px;font-weight:600;color:var(–text-secondary);}
.grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;}

/* CARD */
.card{background:var(–bg-secondary);border:1px solid var(–border-subtle);border-radius:var(–r-md);padding:14px;position:relative;display:flex;flex-direction:column;gap:6px;transition:border-color .2s,transform .15s;}
.card:active{transform:scale(0.98);}
.card.low-stock{border-color:rgba(239,68,68,0.4);background:linear-gradient(145deg,var(–bg-secondary),var(–danger-dim));}
.card.zero-stock{opacity:0.5;}
.card-alert{position:absolute;top:10px;right:10px;width:8px;height:8px;border-radius:50%;background:var(–danger);box-shadow:0 0 8px var(–danger);animation:pulse-dot 1.5s infinite;}
.card-ref{font-family:var(–mono);font-size:12px;font-weight:600;color:var(–gold);letter-spacing:0.5px;}
.card-name{font-size:14px;font-weight:600;color:var(–text-primary);line-height:1.3;}
.card-compat{font-size:11px;color:var(–text-secondary);line-height:1.4;flex:1;}
.card-badge{display:inline-flex;align-items:center;font-size:10px;font-weight:600;padding:4px 8px;border-radius:var(–r-xs);width:fit-content;}
.badge-lame{background:var(–info-dim);color:var(–info);}
.badge-telecommande{background:var(–success-dim);color:var(–success);}
.badge-transpondeur{background:var(–gold-glow);color:var(–gold);}
.badge-lishi{background:var(–warning-dim);color:var(–warning);}
.badge-pile{background:var(–purple-dim);color:var(–purple);}
.qty-row{display:flex;align-items:center;justify-content:space-between;margin-top:8px;padding-top:10px;border-top:1px solid var(–border-subtle);}
.qty-controls{display:flex;align-items:center;gap:12px;}
.qty-btn{width:36px;height:36px;border-radius:50%;background:var(–bg-tertiary);border:1px solid var(–border-medium);color:var(–text-primary);font-size:18px;font-weight:500;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .15s;user-select:none;}
.qty-btn:active{background:var(–gold);color:var(–bg-primary);border-color:var(–gold);transform:scale(0.9);}
.qty-value{font-family:var(–mono);font-size:22px;font-weight:700;min-width:32px;text-align:center;}
.qty-value.ok{color:var(–success);}.qty-value.low{color:var(–danger);}.qty-value.zero{color:var(–text-muted);}
.card-actions{display:flex;gap:6px;}
.action-btn{flex:1;padding:8px 0;border-radius:var(–r-xs);border:1px solid var(–border-subtle);background:var(–bg-tertiary);color:var(–text-secondary);font-size:11px;font-weight:500;font-family:inherit;cursor:pointer;transition:all .15s;}
.action-btn:active{background:var(–bg-elevated);}
.action-btn.danger{color:var(–danger);border-color:rgba(239,68,68,0.3);}
.action-btn.danger:active{background:var(–danger-dim);}
.empty-state{grid-column:1/-1;text-align:center;padding:60px 20px;}
.empty-icon{width:64px;height:64px;margin:0 auto 16px;background:var(–bg-tertiary);border-radius:50%;display:flex;align-items:center;justify-content:center;color:var(–text-muted);}
.empty-title{font-size:16px;font-weight:600;color:var(–text-secondary);margin-bottom:6px;}
.empty-text{font-size:13px;color:var(–text-tertiary);}

/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.75);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);z-index:200;display:flex;align-items:flex-end;animation:fadeIn .2s ease;}
@keyframes fadeIn{from{opacity:0;}to{opacity:1;}}
.modal{background:var(–bg-secondary);border-radius:var(–r-xl) var(–r-xl) 0 0;width:100%;max-height:90vh;overflow-y:auto;padding:20px 20px calc(20px + var(–safe-bottom));border-top:1px solid var(–border-medium);animation:slideUp .3s ease;}
@keyframes slideUp{from{transform:translateY(100%);}to{transform:translateY(0);}}
.modal-handle{width:40px;height:4px;background:var(–border-strong);border-radius:2px;margin:0 auto 20px;}
.modal-title{font-size:20px;font-weight:700;margin-bottom:20px;text-align:center;}
.form-group{margin-bottom:16px;}
.form-label{display:block;font-size:12px;font-weight:600;color:var(–text-secondary);margin-bottom:6px;text-transform:uppercase;letter-spacing:0.5px;}
.form-input,.form-select,.form-textarea{width:100%;background:var(–bg-tertiary);border:1px solid var(–border-medium);border-radius:var(–r-sm);color:var(–text-primary);font-size:15px;font-family:inherit;padding:14px 16px;outline:none;-webkit-appearance:none;transition:border-color .2s,box-shadow .2s;}
.form-input:focus,.form-select:focus,.form-textarea:focus{border-color:var(–gold);box-shadow:0 0 0 3px var(–gold-glow);}
.form-textarea{height:80px;resize:none;}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.modal-buttons{display:flex;gap:10px;margin-top:24px;}
.modal-btn{flex:1;padding:16px;border-radius:var(–r-md);border:none;font-size:15px;font-weight:600;font-family:inherit;cursor:pointer;transition:all .15s;}
.modal-btn:active{transform:scale(0.98);}
.modal-btn.cancel{background:var(–bg-tertiary);color:var(–text-secondary);}
.modal-btn.save{background:var(–gold);color:var(–bg-primary);box-shadow:0 4px 16px var(–gold-glow);}
.import-area{background:var(–bg-tertiary);border:2px dashed var(–border-medium);border-radius:var(–r-md);padding:24px;text-align:center;margin-bottom:16px;cursor:pointer;transition:border-color .2s;}
.import-area:active{border-color:var(–gold);}
.import-area-icon{font-size:32px;margin-bottom:8px;}
.import-area-text{font-size:14px;font-weight:600;color:var(–text-secondary);margin-bottom:4px;}
.import-area-sub{font-size:12px;color:var(–text-tertiary);}
.import-textarea{width:100%;background:var(–bg-tertiary);border:1px solid var(–border-medium);border-radius:var(–r-sm);color:var(–text-primary);font-size:12px;font-family:var(–mono);padding:12px;outline:none;height:120px;resize:none;}

/* TOAST */
.toast{position:fixed;bottom:calc(24px + var(–safe-bottom));left:50%;transform:translateX(-50%) translateY(100px);background:var(–bg-elevated);color:var(–text-primary);border:1px solid var(–border-medium);border-radius:var(–r-xl);padding:12px 24px;font-size:14px;font-weight:500;z-index:300;pointer-events:none;opacity:0;transition:transform .3s ease,opacity .3s ease;box-shadow:0 8px 40px rgba(0,0,0,0.5);white-space:nowrap;}
.toast.show{transform:translateX(-50%) translateY(0);opacity:1;}
.toast.success{border-color:rgba(34,197,94,0.4);background:linear-gradient(145deg,var(–bg-elevated),var(–success-dim));}
.toast.error{border-color:rgba(239,68,68,0.4);background:linear-gradient(145deg,var(–bg-elevated),var(–danger-dim));}
.hidden{display:none!important;}
@media(max-width:374px){.grid{grid-template-columns:1fr;}}
@media(min-width:500px){.grid{grid-template-columns:repeat(3,1fr);}}
</style>

</head>
<body>

<header class="header">
<div class="header-top">
<div class="brand">
<div class="brand-icon">N</div>
<div class="brand-text">
<div class="brand-title">NeuAutoStock</div>
<div class="brand-subtitle">Gestion Serrurerie Auto</div>
</div>
</div>
<div class="header-actions">
<span class="storage-badge" id="storageBadge"><span class="dot"></span><span id="storageLabel">…</span></span>
<button class="btn-icon" onclick="openImportModal()" title="Charger">📂</button>
<button class="btn-icon" onclick="exportData()" title="Exporter">💾</button>
<button class="btn-add" onclick="openModal()">
<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
Ajouter
</button>
</div>
</div>
<div class="search-wrap" id="searchWrap">
<svg class="search-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
<input type="text" class="search-input" id="searchInput" placeholder="Rechercher réf., marque, modèle…" autocorrect="off" autocapitalize="off" spellcheck="false">
<button class="search-clear" onclick="clearSearch()">✕</button>
</div>
<div class="cats-scroll"><div class="cats" id="cats"></div></div>
</header>

<section class="quick-stock" id="quickStock">
<div class="quick-stock-header" onclick="toggleQuickStock()">
<span class="quick-stock-title">
<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
Vue rapide stock
</span>
<button class="quick-stock-toggle">
<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="18 15 12 9 6 15"/></svg>
</button>
</div>
<div class="quick-stock-grid" id="quickStockGrid"></div>
</section>

<div class="stats-bar" id="statsBar"></div>
<main class="main-content" id="mainContent"></main>

<!-- ADD/EDIT MODAL -->

<div class="modal-overlay hidden" id="modalOverlay" onclick="closeModal(event)">
<div class="modal" onclick="event.stopPropagation()">
<div class="modal-handle"></div>
<h2 class="modal-title" id="modalTitle">Ajouter un article</h2>
<div class="form-group">
<label class="form-label">Référence</label>
<input type="text" class="form-input" id="formRef" placeholder="ex: HU66, ID48…" autocorrect="off" autocapitalize="characters">
</div>
<div class="form-group">
<label class="form-label">Désignation</label>
<input type="text" class="form-input" id="formName" placeholder="ex: Lame HU66 VAG" autocorrect="off">
</div>
<div class="form-group">
<label class="form-label">Catégorie</label>
<select class="form-select" id="formCat">
<option value="lame">🔑 Lame</option>
<option value="telecommande">📡 Télécommande</option>
<option value="transpondeur">📟 Transpondeur</option>
<option value="lishi">🔧 Lishi</option>
<option value="pile">🔋 Pile</option>
</select>
</div>
<div class="form-group">
<label class="form-label">Compatibilités</label>
<textarea class="form-textarea" id="formCompat" placeholder="ex: VW Golf IV-VII, Audi A3, Seat, Skoda"></textarea>
</div>
<div class="form-row">
<div class="form-group">
<label class="form-label">Quantité</label>
<input type="number" class="form-input" id="formQty" min="0" value="1" inputmode="numeric">
</div>
<div class="form-group">
<label class="form-label">Seuil alerte</label>
<input type="number" class="form-input" id="formThreshold" min="0" value="2" inputmode="numeric">
</div>
</div>
<div class="modal-buttons">
<button class="modal-btn cancel" onclick="closeModal()">Annuler</button>
<button class="modal-btn save" onclick="saveItem()">Enregistrer</button>
</div>
</div>
</div>

<!-- IMPORT MODAL -->

<div class="modal-overlay hidden" id="importModalOverlay" onclick="closeImportModal(event)">
<div class="modal" onclick="event.stopPropagation()">
<div class="modal-handle"></div>
<h2 class="modal-title">📂 Charger une sauvegarde</h2>
<div class="import-area" onclick="document.getElementById('fileInput').click()">
<div class="import-area-icon">📄</div>
<div class="import-area-text">Appuyer pour sélectionner le fichier</div>
<div class="import-area-sub">Fichier .json exporté depuis l'app</div>
</div>
<input type="file" id="fileInput" accept=".json,application/json" style="display:none" onchange="loadFile(event)">
<div style="text-align:center;color:var(--text-tertiary);font-size:12px;margin-bottom:12px;">— ou coller le JSON —</div>

let items=[], currentCat='', editId=null, quickStockCollapsed=false;
let storageEngine='memory';
const CATEGORIES=[
{key:'',label:'Tout',icon:''},
{key:'lame',label:'Lames',icon:'🔑'},
{key:'telecommande',label:'Télécom.',icon:'📡'},
{key:'transpondeur',label:'Transpond.',icon:'📟'},
{key:'lishi',label:'Lishi',icon:'🔧'},

// ═══════════ INDEXEDDB ═══════════
const DB_NAME='NeuAutoStockDB', DB_VER=1, STORE='items';
let db=null;

function openDB(){
return new Promise((resolve,reject)=>{
if(!window.indexedDB){reject('no-idb');return;}
const req=indexedDB.open(DB_NAME,DB_VER);
req.onupgradeneeded=e=>e.target.result.createObjectStore(STORE,{keyPath:'id'});
req.onsuccess=e=>{db=e.target.result;resolve(db);};
req.onerror=()=>reject('error');
});
}
function idbGetAll(){
return new Promise((res,rej)=>{
const req=db.transaction(STORE,'readonly').objectStore(STORE).getAll();
req.onsuccess=()=>res(req.result);
req.onerror=()=>rej();
});
}
function idbSaveAll(data){
return new Promise((res,rej)=>{
const tx=db.transaction(STORE,'readwrite');
const st=tx.objectStore(STORE);
st.clear();
data.forEach(i=>st.put(i));
tx.oncomplete=()=>res();
tx.onerror=()=>rej();
});
}

async function persistLoad(){
// 1. IndexedDB (fonctionne en file:// sur Safari iOS)
try{
await openDB();
const data=await idbGetAll();
if(data&&data.length){storageEngine='indexeddb';updateBadge();return data;}
storageEngine='indexeddb';updateBadge();
}catch(e){}
// 2. localStorage (fonctionne sur PC / Safari avec serveur)
try{
const d=localStorage.getItem('neuautostock-v1');
if(d){
const parsed=JSON.parse(d);
if(parsed&&parsed.length){
storageEngine='localstorage';updateBadge();
if(db){try{await idbSaveAll(parsed);storageEngine='indexeddb';updateBadge();}catch(e){}}
return parsed;
}
}
storageEngine='localstorage';updateBadge();
}catch(e){}
// 3. Mémoire uniquement
storageEngine='memory';updateBadge();
return null;
}

async function persistSave(){
if(storageEngine==='indexeddb'){try{await idbSaveAll(items);return;}catch(e){}}
if(storageEngine==='localstorage'){try{localStorage.setItem('neuautostock-v1',JSON.stringify(items));return;}catch(e){}}
// mémoire : rien à faire
}

function updateBadge(){
const b=document.getElementById('storageBadge');
const l=document.getElementById('storageLabel');
if(storageEngine==='indexeddb'||storageEngine==='localstorage'){
b.className='storage-badge';l.textContent='Auto-save ✓';
}else{
b.className='storage-badge warn';l.textContent='Export requis ⚠';
}
}

// ═══════════ INIT ═══════════
async function init(){
const stored=await persistLoad();
items=stored&&stored.length?stored:JSON.parse(JSON.stringify(DEFAULTS));
if(!stored||!stored.length) await persistSave();
renderCategories();render();
document.getElementById('searchInput').addEventListener('input',function(){
document.getElementById('searchWrap').classList.toggle('has-value',this.value.length>0);
render();
});
}

// ═══════════ EXPORT / IMPORT ═══════════
function exportData(){
const json=JSON.stringify({version:1,date:new Date().toISOString(),items},null,2);
const blob=new Blob([json],{type:'application/json'});
const url=URL.createObjectURL(blob);
const a=document.createElement('a');
a.href=url;a.download='NeuAutoStock_'+new Date().toISOString().slice(0,10)+'.json';
document.body.appendChild(a);a.click();document.body.removeChild(a);URL.revokeObjectURL(url);
showToast('✅ Sauvegarde téléchargée','success');
}
function openImportModal(){
document.getElementById('importTextarea').value='';
document.getElementById('fileInput').value='';
document.getElementById('importModalOverlay').classList.remove('hidden');
}
function closeImportModal(e){if(e&&e.target!==e.currentTarget)return;document.getElementById('importModalOverlay').classList.add('hidden');}
function loadFile(ev){
const f=ev.target.files[0];if(!f)return;
const r=new FileReader();r.onload=e=>{document.getElementById('importTextarea').value=e.target.result;};r.readAsText(f);
}
async function applyImport(){
const raw=document.getElementById('importTextarea').value.trim();
if(!raw){showToast('Aucune donnée','error');return;}
try{
const p=JSON.parse(raw);
const loaded=Array.isArray(p)?p:p.items;
if(!loaded||!loaded.length)throw new Error();
items=loaded;await persistSave();closeImportModal();render();
showToast('✅ '+items.length+' articles chargés','success');
}catch(e){showToast('❌ Fichier invalide','error');}
}

// ═══════════ RENDU ═══════════
function renderCategories(){
document.getElementById('cats').innerHTML=CATEGORIES.map(c=>{
const count=c.key==='alerte'?items.filter(i=>i.qte>0&&i.qte<=i.seuil).length
:c.key?items.filter(i=>i.cat===c.key).length:items.length;
return`<button class="cat-pill ${currentCat===c.key?'active':''} ${c.key==='alerte'?'alert-cat':''}" onclick="setCategory('${c.key}')">
${c.icon?c.icon+' ':''}${c.label}<span class="count">${count}</span></button>`;
}).join('');
}
function render(){
const q=document.getElementById('searchInput').value.toLowerCase().trim();
const filtered=items.filter(item=>{
if(currentCat==='alerte')return item.qte>0&&item.qte<=item.seuil;
if(currentCat&&item.cat!==currentCat)return false;
if(!q)return true;
return(item.ref+' '+item.nom+' '+item.compat).toLowerCase().includes(q);
});
renderQuickStock();renderStats();renderGrid(filtered);renderCategories();
}
function renderQuickStock(){
const sorted=[...items].sort((a,b)=>{
const aA=a.qte>0&&a.qte<=a.seuil,bA=b.qte>0&&b.qte<=b.seuil;
if(aA&&!bA)return-1;if(!aA&&bA)return 1;
if(a.qte===0&&b.qte>0)return 1;if(b.qte===0&&a.qte>0)return-1;
return a.ref.localeCompare(b.ref);
});
document.getElementById('quickStockGrid').innerHTML=sorted.map(item=>{
const isLow=item.qte>0&&item.qte<=item.seuil,isZero=item.qte===0;
const cls=isZero?'zero-stock':isLow?'low-stock':item.qte>0?'in-stock':'';
return`<div class="quick-ref ${cls}" onclick="scrollToItem(${item.id})" title="${item.nom}">
${isLow?'<div class="quick-ref-dot"></div>':''}
<div class="quick-ref-code">${item.ref}</div>
<div class="quick-ref-qty">${item.qte}</div></div>`;
}).join('');
}
function renderStats(){
const ac=items.filter(i=>i.qte>0&&i.qte<=i.seuil).length;
const stats=[
{v:items.length,l:'Réfs'},{v:items.reduce((s,i)=>s+i.qte,0),l:'En stock'},
{v:items.filter(i=>i.cat==='lame').length,l:'Lames'},
{v:items.filter(i=>i.cat==='telecommande').length,l:'Télécom.'},
{v:items.filter(i=>i.cat==='transpondeur').length,l:'Transpond.'},
{v:items.filter(i=>i.cat==='lishi').length,l:'Lishi'},
{v:items.filter(i=>i.cat==='pile').length,l:'Piles'},
{v:ac,l:'Alertes',w:ac>0},
];
document.getElementById('statsBar').innerHTML=stats.map(s=>
`<div class="stat-chip"><div class="stat-value ${s.w?'warn':''}">${s.v}</div><div class="stat-label">${s.l}</div></div>`
).join('');
}
function renderGrid(filtered){
const c=document.getElementById('mainContent');
if(!filtered.length){
c.innerHTML=`<div class="empty-state"><div class="empty-icon"><svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg></div><div class="empty-title">Aucun article trouvé</div><div class="empty-text">Essayez une autre recherche</div></div>`;
return;
}
const groups=[{key:'lame',label:'Lames'},{key:'telecommande',label:'Télécommandes'},{key:'transpondeur',label:'Transpondeurs'},{key:'lishi',label:'Lishi'},{key:'pile',label:'Piles'}];
let html='';
if(!currentCat||currentCat==='alerte'){
for(const g of groups){
const gi=filtered.filter(i=>i.cat===g.key);if(!gi.length)continue;
html+=`<div class="section-header"><span class="section-title">${g.label}</span><span class="section-badge">${gi.length}</span><div class="section-line"></div></div><div class="grid">${gi.map(renderCard).join('')}</div>`;
}
}else{html=`<div class="grid">${filtered.map(renderCard).join('')}</div>`;}
c.innerHTML=html;
}
function renderCard(item){
const isLow=item.qte>0&&item.qte<=item.seuil,isZero=item.qte===0;
return`<div class="card ${isZero?'zero-stock':isLow?'low-stock':''}" id="item-${item.id}">
${isLow?'<div class="card-alert"></div>':''}
<div class="card-ref">${item.ref}</div>
<div class="card-name">${item.nom}</div>
<div class="card-compat">${item.compat}</div>
<div class="card-badge badge-${item.cat}">${CAT_LABELS[item.cat]||item.cat}</div>
<div class="qty-row"><div class="qty-controls">
<button class="qty-btn" onclick="adjustQty(${item.id},-1)">−</button>
<span class="qty-value ${isZero?'zero':isLow?'low':'ok'}">${item.qte}</span>
<button class="qty-btn" onclick="adjustQty(${item.id},+1)">+</button>
</div></div>
<div class="card-actions">
<button class="action-btn" onclick="editItem(${item.id})">Modifier</button>
<button class="action-btn danger" onclick="deleteItem(${item.id})">Suppr.</button>
</div></div>`;
}

// ═══════════ ACTIONS ═══════════
function setCategory(cat){currentCat=cat;render();}
function clearSearch(){const i=document.getElementById('searchInput');i.value='';document.getElementById('searchWrap').classList.remove('has-value');render();i.focus();}
function toggleQuickStock(){quickStockCollapsed=!quickStockCollapsed;document.getElementById('quickStock').classList.toggle('collapsed',quickStockCollapsed);}
function scrollToItem(id){
currentCat='';render();
setTimeout(()=>{
const el=document.getElementById('item-'+id);
if(el){el.scrollIntoView({behavior:'smooth',block:'center'});el.style.boxShadow='0 0 0 2px var(--gold)';setTimeout(()=>el.style.boxShadow='',1500);}
},100);
}
async function adjustQty(id,delta){
const item=items.find(i=>i.id===id);if(!item)return;
item.qte=Math.max(0,item.qte+delta);
await persistSave();render();
showToast((delta>0?'+1':'−1')+' · '+item.ref,'success');
}
async function deleteItem(id){
const item=items.find(i=>i.id===id);
if(!item||!confirm('Supprimer "'+item.ref+'" ?'))return;
items=items.filter(i=>i.id!==id);await persistSave();render();showToast('Article supprimé','error');
}

// ═══════════ MODAL ═══════════
function openModal(id=null){
editId=id;
if(id){
const item=items.find(i=>i.id===id);if(!item)return;
document.getElementById('modalTitle').textContent="Modifier l'article";
document.getElementById('formRef').value=item.ref;
document.getElementById('formName').value=item.nom;
document.getElementById('formCat').value=item.cat;
document.getElementById('formCompat').value=item.compat;
document.getElementById('formQty').value=item.qte;
document.getElementById('formThreshold').value=item.seuil;
}else{
document.getElementById('modalTitle').textContent='Ajouter un article';
document.getElementById('formRef').value='';document.getElementById('formName').value='';
document.getElementById('formCat').value='lame';document.getElementById('formCompat').value='';
document.getElementById('formQty').value=1;document.getElementById('formThreshold').value=2;
}
document.getElementById('modalOverlay').classList.remove('hidden');
}
function closeModal(e){if(e&&e.target!==e.currentTarget)return;document.getElementById('modalOverlay').classList.add('hidden');}
async function saveItem(){
const ref=document.getElementById('formRef').value.trim();
if(!ref){showToast('Référence obligatoire','error');return;}
const data={id:editId||Date.now(),ref,
nom:document.getElementById('formName').value.trim()||ref,
cat:document.getElementById('formCat').value,
compat:document.getElementById('formCompat').value.trim(),
qte:parseInt(document.getElementById('formQty').value)||0,
seuil:parseInt(document.getElementById('formThreshold').value)||0
};
if(editId){const i=items.findIndex(x=>x.id===editId);if(i!==-1)items[i]=data;}
else items.push(data);
await persistSave();render();closeModal();
showToast(editId?'Article mis à jour':'Article ajouté','success');
}
function editItem(id){openModal(id);}

// ═══════════ TOAST ═══════════
let toastTimeout;
function showToast(msg,type='success'){
const t=document.getElementById('toast');
t.textContent=msg;t.className='toast show '+type;
clearTimeout(toastTimeout);
toastTimeout=setTimeout(()=>t.classList.remove('show'),2000);
}

init();
</script>

</body>
</html>
